<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sarathi Study — Nepal Textbooks Grade 1-10</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;background:#FAF8F4;color:#2B2620;display:flex;min-height:100vh}
/* sidebar */
.sidebar{width:280px;border-right:1px solid #E5DFD2;display:flex;flex-direction:column;background:#fff;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s ease}
.brand{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid #E5DFD2;flex-shrink:0}
.brandMark{width:34px;height:34px;border-radius:8px;background:#A33B2C;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;font-family:'Noto Serif Devanagari',serif}
.brandTitle{font-weight:700;font-size:14.5px;letter-spacing:-.01em}
.brandSub{font-size:11.5px;color:#8A8070;margin-top:1px}
.sidebar-search{padding:8px 12px;border-bottom:1px solid #E5DFD2;flex-shrink:0}
.sidebar-search input{width:100%;padding:7px 10px;border-radius:6px;border:1px solid #E5DFD2;background:#FAF8F4;font-size:13px;outline:none;color:#2B2620}
.sidebar-search input::placeholder{color:#A8A090}
.treeScroll{flex:1;overflow-y:auto;padding:8px 8px 20px}
.treeScroll::-webkit-scrollbar{width:4px}
.treeScroll::-webkit-scrollbar-thumb{background:#D9D0C0;border-radius:2px}
.classRow{width:100%;display:flex;align-items:center;gap:8px;padding:9px 8px;background:none;border:none;cursor:pointer;font-size:13.5px;font-weight:600;color:#2B2620;border-radius:6px;text-align:left;transition:.15s}
.classRow:hover{background:#F3E9DE}
.classRow.active{background:#F3E9DE;color:#A33B2C}
.countPill{margin-left:auto;font-size:10.5px;background:#F0EBE0;color:#8A8070;border-radius:10px;padding:1px 7px;font-weight:600}
.classRow.active .countPill{background:#E8D5C4}
.subjectList{padding-left:16px;display:flex;flex-direction:column;margin-bottom:4px;overflow:hidden;transition:max-height .25s ease;max-height:0}
.subjectList.open{max-height:2000px}
.subjectRow{display:flex;align-items:center;gap:8px;padding:7px 8px;background:none;border:none;cursor:pointer;font-size:12.8px;color:#5C5446;border-radius:6px;text-align:left;width:100%;transition:.15s}
.subjectRow:hover{background:#F3E9DE}
.subjectRow.active{background:#F3E9DE;color:#A33B2C;font-weight:600}
.subjectLabel{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* main */
.main{margin-left:280px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.mainHeader{padding:16px 28px;border-bottom:1px solid #E5DFD2;display:flex;align-items:center;gap:16px;flex-shrink:0;background:#fff;position:sticky;top:0;z-index:50}
.menuBtn{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:#5C5446;padding:4px;line-height:1}
.crumb{font-size:13.5px;font-weight:600;color:#5C5446}
/* content areas */
.bodyArea{flex:1;display:flex;overflow:hidden}
.chapterCol{width:270px;border-right:1px solid #E5DFD2;padding:14px;overflow-y:auto;overflow-x:auto;background:#fff}
.colLabel{font-size:11px;font-weight:700;color:#A8A090;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.chapterBtn{text-align:left;padding:9px 10px;border-radius:7px;border:none;background:none;font-size:12.8px;color:#3B3528;cursor:pointer;line-height:1.3;transition:.12s;width:100%}
.chapterBtn:hover{background:#F3E9DE}
.chapterBtn.active{background:#A33B2C;color:#fff;font-weight:600}
.workCol{flex:1;padding:28px;overflow-y:auto;display:flex;flex-direction:column}
.pickPrompt{color:#A8A090;font-size:14px;margin-top:60px;text-align:center}
.chapterTitle{font-size:20px;font-weight:700;margin-bottom:20px;color:#2B2620}
.actionsRow{display:flex;gap:14px;margin-bottom:24px}
.actionCard{flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:6px;padding:16px;border-radius:10px;border:1px solid #E5DFD2;background:#fff;cursor:pointer;text-align:left;color:#A33B2C;transition:.15s}
.actionCard:hover{border-color:#C9BFA8;background:#FAF8F4}
.actionCard:disabled{opacity:.5;cursor:not-allowed}
.actionLabel{font-size:13.5px;font-weight:700;color:#2B2620}
.actionDesc{font-size:11.5px;color:#8A8070;line-height:1.4}
.errorBox{background:#FBE7E3;color:#A33B2C;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
.resultBox{background:#fff;border:1px solid #E5DFD2;border-radius:10px;padding:20px}
.resultMeta{display:flex;align-items:center;gap:6px;font-size:11.5px;color:#8A8070;margin-bottom:12px;font-weight:600}
.resultText{white-space:pre-wrap;font-family:inherit;font-size:13.5px;line-height:1.6;color:#2B2620;margin:0}
.viewToggle{margin-left:auto;display:flex;gap:4px;background:#F0EBE0;border-radius:6px;padding:2px}
.viewToggle button{padding:5px 12px;border:none;background:transparent;border-radius:4px;font-size:12px;font-weight:600;color:#5C5446;cursor:pointer;transition:.12s}
.viewToggle button.active{background:#fff;color:#A33B2C}
.pdfLoading{display:flex;align-items:center;justify-content:center;height:300px;color:#8A8070;font-size:14px}
.pdfUnavailable{text-align:center;padding:40px;color:#8A8070}
.pdfUnavailable h3{font-size:16px;color:#2B2620;margin-bottom:8px}
.pdfContainer{background:#f5f5f5;border-radius:10px;overflow:hidden;display:flex;flex-direction:column;flex:1}
.pdfNavBar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border-bottom:1px solid #E5DFD2;font-size:13px;flex-wrap:wrap}
.pdfNavBtn{padding:4px 10px;border:1px solid #D9D0C0;background:#fff;border-radius:4px;cursor:pointer;font-size:14px;color:#2B2620;line-height:1;transition:.12s}
.pdfNavBtn:hover{background:#F3E9DE}
.pdfCanvasWrapper{flex:1;overflow:auto;display:flex;justify-content:center;padding:16px}
#pdfCanvas{box-shadow:0 2px 8px rgba(0,0,0,.15)}
.pdfPageInput{width:50px;text-align:center;border:1px solid #D9D0C0;border-radius:4px;padding:3px 4px;font-size:13px;outline:none}
.pdfPageInput:focus{border-color:#A33B2C}
/* empty state */
.emptyState{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;margin:auto}
.emptyIcon{font-size:36px;margin-bottom:10px}
.emptyTitle{font-size:16px;font-weight:700;margin-bottom:6px}
.emptyDesc{font-size:13px;color:#8A8070;max-width:380px;line-height:1.5}
/* toc table in work col */
.tocTable{width:100%;border-collapse:collapse;font-size:12.8px}
.tocTable th{background:#F3E9DE;padding:5px 6px;text-align:left;font-weight:600;font-size:10.5px;color:#5C5446;border-bottom:2px solid #E5DFD2;white-space:nowrap}
.tocTable td{padding:4px 6px;border-bottom:1px solid #F0EBE0;line-height:1.3}
.tocTable tr:hover td{background:#F3E9DE}
.tocTable tr.active td{background:#A33B2C;color:#fff;font-weight:600}
.tocTable tr.active:hover td{background:#A33B2C}
.tocTable .num{width:24px;text-align:center;color:#8A8070;font-size:11px}
.tocTable .page{width:40px;text-align:right;color:#8A8070;font-size:11px;white-space:nowrap}
.tocTable .genre{font-size:10.5px;color:#8A8070;white-space:nowrap;width:52px;text-align:center}
.tocTable tr.active .num,
.tocTable tr.active .genre,
.tocTable tr.active .page{color:#fff}

/* chapter content */
.chapterContent{background:#fff;border:1px solid #E5DFD2;border-radius:10px;padding:24px;margin-bottom:24px}
.chapterContent h1{font-size:22px;font-weight:700;color:#2B2620;margin:28px 0 12px 0;padding-bottom:8px;border-bottom:2px solid #F3E9DE}
.chapterContent h1:first-child{margin-top:0}
.chapterContent h2{font-size:18px;font-weight:700;color:#2B2620;margin:24px 0 10px 0}
.chapterContent h3{font-size:15px;font-weight:700;color:#2B2620;margin:20px 0 8px 0}
.chapterContent p{margin:8px 0;line-height:1.7;font-size:13.5px;color:#2B2620}
.chapterContent ul,.chapterContent ol{margin:6px 0 6px 22px;line-height:1.7}
.chapterContent li{margin:3px 0;font-size:13.5px}
.chapterContent strong{font-weight:700}
.chapterContent em{font-style:italic}
.chapterContent img{max-width:100%;height:auto;border-radius:8px;margin:12px 0;border:1px solid #F0EBE0}
.chapterContent hr{border:none;border-top:2px solid #F3E9DE;margin:20px 0}
.chapterContent code{background:#F3E9DE;padding:1px 5px;border-radius:4px;font-size:0.9em;color:#5C5446}
.chapterContent pre{background:#F8F6F0;border:1px solid #E5DFD2;border-radius:8px;padding:14px;overflow-x:auto;margin:12px 0;font-size:13px;line-height:1.5}
.chapterContent pre code{background:none;padding:0;border-radius:0}
.chapterContent a{color:#A33B2C;text-decoration:underline}
.chapterContent.fullBook{max-height:none;overflow-y:visible;margin-bottom:0}
/* genre badge in work column */
.genreBadge{display:inline-block;font-size:11px;color:#8A8070;background:#F3E9DE;border-radius:4px;padding:2px 8px;margin-left:8px;font-weight:400}
.chapterMeta{font-size:12px;color:#8A8070;margin-top:-14px;margin-bottom:18px}
.simpleList{list-style:none;padding:0}
.simpleList li{padding:5px 0;border-bottom:1px solid #F0EBE0;font-size:13.5px;display:flex;align-items:baseline;gap:8px}
.simpleList li .idx{color:#8A8070;font-size:12.5px;min-width:26px;text-align:right}
/* welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:40px;margin:auto}
.welcome .flagIcon{font-size:56px;margin-bottom:12px}
.welcome h2{font-size:24px;color:#2B2620;margin-bottom:6px}
.welcome p{color:#8A8070;max-width:440px;line-height:1.6;font-size:14px}
/* overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
.overlay.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.loader{animation:spin .9s linear infinite}
/* query row */
.queryRow{display:flex;gap:8px;margin-bottom:16px}
.queryInput{flex:1;padding:10px 14px;border-radius:8px;border:1px solid #E5DFD2;background:#fff;font-size:13.5px;outline:none;color:#2B2620;font-family:inherit}
.queryInput:focus{border-color:#A33B2C}
.queryInput::placeholder{color:#A8A090}
.queryBtn{padding:10px 20px;border-radius:8px;border:none;background:#A33B2C;color:#fff;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s}
.queryBtn:hover{background:#8C2E20}
.queryBtn:disabled{opacity:.5;cursor:not-allowed}
.loadingDots::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}100%{content:''}}
@media(max-width:900px){
  .chapterCol{width:220px}
  .actionsRow{flex-direction:column}
}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .menuBtn{display:block}
  .main{margin-left:0}
  .mainHeader{padding:14px 16px}
  .crumb{font-size:12.5px}
  .bodyArea{flex-direction:column}
  .chapterCol{width:100%;border-right:none;border-bottom:1px solid #E5DFD2;padding:14px;max-height:40vh}
  .workCol{padding:18px}
  .actionsRow{flex-direction:column}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="brand">
    <div class="brandMark">सा</div>
    <div>
      <div class="brandTitle">Sarathi Study</div>
      <div class="brandSub">Class 1–10 · CDC Nepal</div>
    </div>
  </div>
  <div class="sidebar-search">
    <input type="text" placeholder="Search class or subject..." oninput="filterSidebar(this.value)">
  </div>
  <div class="treeScroll" id="sidebarNav"></div>
</aside>

<main class="main">
  <div class="mainHeader">
    <button class="menuBtn" onclick="toggleSidebar()">&#9776;</button>
    <div class="crumb" id="crumb">Select a class</div>
  </div>
  <div class="bodyArea" id="bodyArea">
    <div class="welcome" id="welcome">
      <div class="flagIcon">📚</div>
      <h2>Sarathi Study</h2>
      <p>Nepal CDC Textbooks Grade 1–10. Select a class and subject from the sidebar to browse chapters.</p>
    </div>
    <div style="display:none;flex:1" id="mainWork">
      <div class="chapterCol" id="chapterCol"></div>
      <div class="workCol" id="workCol"></div>
    </div>
  </div>
</main>

<script>
// ====== FULL DATA ======
const INDEX = {
  "Class 1": ["English","Mathematics (English)","Mathematics (Nepali)","Nepali","Serofero"],
  "Class 2": ["English","Health Physical Creative Arts (English)","Mathematics (English)","Mathematics (Nepali)","Nepali"],
  "Class 3": ["English","Maths (English)","Maths (Nepali)","Nepali","Serofero"],
  "Class 4": ["English","Health Physical Creative Arts (Nepali)","Mathematics (English)","Mathematics (Nepali)","Nepali","Science and Technology (English)","Science and Technology (Nepali)","Social Studies and Human Value Education"],
  "Class 5": ["English","Mathematics (English)","Mathematics (Nepali)","Nepali","Science and Technology","Science Health Physical (English)","Science Health Physical (Nepali)","Social Studies Creative Arts (English)","Social Studies Creative Arts (Nepali)"],
  "Class 6": ["English","Health Physical (Nepali)","Health Physical Creative Arts (English)","Maths (English Transcribed)","Mathematics (Nepali)","Nepali","Science (Nepali)","Social Studies"],
  "Class 7": ["English","Health Physical (Nepali)","Health Physical Creative Arts (English)","Maths (English)","Maths (Nepali)","Nepali","Science Technology (English)","Science Technology (Nepali)","Social Studies"],
  "Class 8": ["English 2019","English 2023","Health Physical Creative Arts (English)","Health Physical Education","Maths (English Transcribed)","Maths (Nepali)","Moral Education (English)","Moral Education (Nepali)","Nepali 2076","Nepali 2080","Science Environment (English)","Science Environment (Nepali)","Social Studies Population","Vocational Technical Education"],
  "Class 9": ["Computer Science 2081","Economics 2074","English 2079","Mathematics (English) 2022","Mathematics (Nepali) 2079","Mathematics Open Ended 2079","Naturopath 2082","Nepali 2079","Optional Mathematics 2074","Optional Mathematics 2076","Science Technology 2024","Social Studies 2079","Yoga Education 2082"],
  "Class 10": ["Accountancy","Compulsory English","Compulsory Mathematics (English)","Compulsory Mathematics (Nepali)","Compulsory Nepali","Computer Science","Economics","History","Optional Mathematics","Science","Social Studies"]
};

const CHAPTERS = {};

function addChapters(cls, subj, chs){ CHAPTERS[cls+'|'+subj] = {chapters: chs, source:'extracted'}; }

// Class 1
addChapters("Class 1","English",["Me and My Family (L1-14)","Alphabet Aa-Zz (L15-71)","Me and My Family (L73-74)","My Daily Life (L75-79)","My School (L80-84)","Our Environment (L85-88)","My Belongings (L89-92)","Our Culture (L93-94)","Communication Tech & Market (L95-97)","Fruits and Vegetables (L98-100)","Hobbies and Interests (L101-102)","Birds and Animals (L103-108)","Wordlist / Learning Chart"]);
addChapters("Class 1","Mathematics (English)",["Shape and Size, and Space","Lines","Geometric Shapes","Numbers up to 9","Zero","Ten","Addition (sum up to 10)","Subtraction (up to 10)","Numbers 11-20","Addition (sum up to 20)","Subtraction (up to 20)","Odd and Even Numbers","Number Names up to 20","Ordinal Numbers","Numbers 21-100","Addition (sum up to 100)","Subtraction (two digits)","Devanagari Numerals","Time","Coins and Notes","Length","Pictograph"]);
addChapters("Class 1","Mathematics (Nepali)",["आकारप्रकार र स्थान","रेखाहरू","ज्यामितीय आकारहरू","९ सम्मका सङ्ख्याहरू","शून्य","दश","योगफल १० सम्म आउने जोड","१० सम्मका सङ्ख्याहरूको घटाउ","११ देखि २० सम्मका सङ्ख्याहरू","योगफल २० सम्म आउने जोड","२० सम्मका सङ्ख्याहरूको घटाउ","जोर र बिजोर सङ्ख्याहरू","२० सम्मका सङ्ख्याहरु अक्षरमा","क्रमात्मक सङ्ख्याहरू","२१ देखि १०० सम्मका सङ्ख्याहरू","योगफल १०० सम्म आउने जोड","दुई अङ्कसम्मका सङ्ख्याहरूको घटाउ","हिन्दु अरेबिक सङ्ख्याङ्कहरू","समय","सिक्का र नोटहरू","लम्बाइ","चित्रग्राफ"]);
addChapters("Class 1","Nepali",["म र मेरो परिवार","मेरो दैनिक जीवन","हाम्रो समुदाय","मेरो विद्यालय","हाम्रो वातावरण","हाम्रो सिर्जना","रुचि र बानी","हाम्रो संस्कृति","सञ्चार, प्रविधि र बजार","हाम्रो क्रियाकलाप","हाम्रो वरपरको संसार"]);
addChapters("Class 1","Serofero",["म र मेरो परिवार","हाम्रो दैनिकी","हाम्रो समुदाय","हाम्रो विद्यालय","हाम्रा वरपरका जीवजन्तु","हाम्रो वातावरण","हाम्रो सिर्जना","हाम्रा संस्कृति","सञ्चार प्रविधि र बजार","हाम्रो वरपरको संसार"]);

// Class 2
addChapters("Class 2","English",["Before you begin I-II","Me and My Family (L1-6)","My Daily Life (L7-12)","My School (L13-18)","Our Environment (L19-24)","My Belongings (L25-27)","Our Culture (L28-30)","Communication Tech & Market (L31-34)","Fruits and Vegetables (L35-37)","Hobbies and Interests (L38-40)","Birds and Animals (L41-44)","Word List / Learning Chart"]);
addChapters("Class 2","Health Physical Creative Arts (English)",["Personal Hygiene","Environmental Sanitation","Food and Nutrition","Disease and Substance abuse","Safety","Drills and Physical Exercise","Athletics and Gymnastic","Games","Yoga","Drawing and Colour","Printmaking, Clay, Collage","Singing and Musical Instruments","Dance and Acting"]);
addChapters("Class 2","Mathematics (English)",["Me and My Family — Capacity","My Daily Life — Time","Number Sense — Numbers up to 1000","Our Community — Comparison","Basic Operations 1 — Add/Subtract","My School — Length, Area, Multiply","My Creation — Geometric Shapes","Communication Tech — Pictograph","Basic Operations 2 — Multiply/Divide"]);
addChapters("Class 2","Mathematics (Nepali)",["म र मेरो परिवार — क्षमता","मेरो दैनिक जीवन — समय","सङ्ख्याको ज्ञान","हाम्रो समुदाय","गणितका आधारभूत क्रिया १","मेरो विद्यालय","मेरो सिर्जना","सञ्चार प्रविधि र बजार","गणितका आधारभूत क्रिया २"]);
addChapters("Class 2","Nepali",["म र मेरो परिवार","मेरो दैनिक जीवन","हाम्रो समुदाय","मेरो विद्यालय","हाम्रो वातावरण","मेरो सिर्जना","रुचि र बानी","हाम्रो संस्कृति","सञ्चार प्रविधि र बजार","हाम्रा क्रियाकलाप","हाम्रो वरपरको संसार"]);

// Class 3
addChapters("Class 3","English",["Before you begin","Me and My Family (L1-5)","My Daily Life (L6-10)","My School (L11-15)","Our Environment (L16-20)","My Belongings (L21-23)","Our Culture (L24-26)","Communication Tech & Market (L27-29)","Fruits and Vegetables (L30-31)","Hobbies and Interests (L32-33)","Birds and Animals (L34-35)","Word List / Learning Chart"]);
addChapters("Class 3","Maths (English)",["My Daily Life 1 — Time 1","Number Sense","My Community","My Creation (Lines, Angles, Shapes)","Basic Operations (Add/Sub/Mul/Div)","My Daily Life 2 — Time 2","Communication, Money, Capacity","Measurement — Area"]);

let activeClass = null, activeSubject = null, selectedChapter = null, result = null, error = null;

function key(c,s){return c+'|'+s}

function getChapters(c,s){
  const k = key(c,s);
  if(UNINDEXABLE.has(k)) return null;
  return CHAPTERS[k] || null;
}

// ====== RENDER SIDEBAR ======
function renderSidebar(){
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  Object.keys(INDEX).forEach(cls => {
    const clsDiv = document.createElement('div');
    const clsBtn = document.createElement('button');
    clsBtn.className = 'classRow' + (activeClass === cls ? ' active' : '');
    clsBtn.innerHTML = `<span>${activeClass===cls?'▾':'▸'}</span><span>${cls}</span><span class="countPill">${INDEX[cls].length}</span>`;
    clsBtn.onclick = () => { activeClass = (activeClass===cls) ? null : cls; activeSubject=null; selectedChapter=null; renderSidebar(); renderContent(); };
    clsDiv.appendChild(clsBtn);

    const subWrap = document.createElement('div');
    subWrap.className = 'subjectList' + (activeClass===cls?' open':'');
    INDEX[cls].forEach((sub,i) => {
      const s = document.createElement('button');
      s.className = 'subjectRow' + (activeClass===cls && activeSubject===i ? ' active' : '');
      s.innerHTML = `<span style="font-size:11px;opacity:.6">${getIcon(sub)}</span><span class="subjectLabel">${sub}</span>`;
      s.onclick = () => { activeSubject=i; selectedChapter=null; result=null; error=null; pdfJumpRequest=null; pdfCurrentPage=1; renderSidebar(); renderContent(); closeSidebar(); };
      subWrap.appendChild(s);
    });
    clsDiv.appendChild(subWrap);
    nav.appendChild(clsDiv);
  });
}

function getIcon(s){
  const l=s.toLowerCase();
  if(l.includes('english')) return '📘';
  if(l.includes('math')) return '📐';
  if(l.includes('nepali')) return '📖';
  if(l.includes('social')||l.includes('population')) return '🌍';
  if(l.includes('science')) return '🔬';
  if(l.includes('health')||l.includes('physical')) return '🏃';
  if(l.includes('moral')) return '⭐';
  if(l.includes('computer')) return '💻';
  if(l.includes('economics')) return '💰';
  if(l.includes('history')) return '📜';
  if(l.includes('account')) return '💰';
  if(l.includes('vocational')) return '🔧';
  if(l.includes('yoga')) return '🧘';
  if(l.includes('serofero')) return '🌿';
  return '📄';
}

// ====== RENDER CONTENT ======
function renderContent(){
  const body = document.getElementById('bodyArea');
  const crumb = document.getElementById('crumb');
  const welcome = document.getElementById('welcome');
  const mainWork = document.getElementById('mainWork');

  if(!activeClass || activeSubject===null){
    welcome.style.display='flex';
    mainWork.style.display='none';
    crumb.textContent = 'Select a class';
    return;
  }

  const cls = activeClass;
  const sub = INDEX[cls][activeSubject];
  crumb.textContent = cls + ' / ' + sub;
  welcome.style.display='none';
  mainWork.style.display='flex';

  // Reset view mode when switching books
  viewMode = 'pdf';
  pdfJumpRequest = null;
  pdfCurrentPage = 1;
  destroyPdfViewer();

  const ch = getChapters(cls, sub);
  const isUnindexable = UNINDEXABLE.has(key(cls, sub));

  // Chapter column
  const chCol = document.getElementById('chapterCol');
  const tblData = TOC_TABLES[key(cls, sub)];
  if(!ch || isUnindexable){
    chCol.innerHTML = `<div class="colLabel">Chapters</div>
      <div style="padding:12px 0;color:#8A8070;font-size:13px;text-align:center">
        ${isUnindexable ? '⚠️ OCR scan too damaged' : 'Chapters not available'}
      </div>`;
  } else if(tblData){

// Devanagari numeral to Arabic numeral converter
function devToAr(num){
  var map = {'०':'0','१':'1','२':'2','३':'3','४':'4','५':'5','६':'6','७':'7','८':'8','९':'9'};
  return String(num).replace(/[०१२३४५६७८९]/g, function(c){ return map[c] || c; });
}

// PDF page offset per book — auto-detected via PDF.js page labels in loadPdfViewer
var PDF_OFFSET_CACHE = {};

function loadPdfViewer(pk){
  var url = pdfUrlCache[pk];
  if (!url) return;

  // Prevent duplicate loads when user clicks chapters while PDF is loading
  if (pdfLoadingPk === pk) return;

  // If same PDF already loaded, check jump request and render
  if (pdfDoc && pdfCurrentPk === pk) {
    resolvePdfJump(pk);
    pdfRenderPage();
    return;
  }

  if (pdfDoc) { pdfDoc.destroy(); pdfDoc = null; }
  pdfCurrentPk = pk;
  pdfLoadingPk = pk;
  pdfScale = null; // reset scale for auto-fit

  var container = document.getElementById('pdfViewerContainer');
  if (!container) return;
  var wrapper = container.querySelector('.pdfCanvasWrapper');
  var nav = container.querySelector('.pdfNavBar');
  if (nav) nav.style.display = '';
  if (wrapper) wrapper.innerHTML = '<canvas id="pdfCanvas"></canvas>';

  pdfjsLib.getDocument(url).promise.then(function(pdf){
    pdfLoadingPk = null;
    pdfDoc = pdf;
    var maxPage = pdf.numPages;
    var totalEl = document.getElementById('pdfTotalPages');
    if (totalEl) totalEl.textContent = maxPage;
    var inputEl = document.getElementById('pdfPageInput');
    if (inputEl) inputEl.max = maxPage;

    // Chain: detect offset → resolve jump → render
    return detectPdfOffsetOnce(pk, pdf).then(function(){
      resolvePdfJump(pk, maxPage);
      pdfRenderPage();
    });
  }).catch(function(err){
    pdfLoadingPk = null;
    container.innerHTML = '<div class="errorBox" style="margin:16px">\u26a0\ufe0f Failed to load PDF: ' + escapeHtml(err.message) + '</div>';
  });
}

// Detect offset if not yet known, using an already-opened PDF document
// Returns a promise that resolves when PDF_OFFSET_CACHE[pk] is set
function detectPdfOffsetOnce(pk, pdf){
  if (PDF_OFFSET_CACHE[pk] !== undefined) {
    return Promise.resolve(); // already known or pending
  }
  PDF_OFFSET_CACHE[pk] = 2; // set immediate default (will be refined if labels found)
  return pdf.getPageLabels().then(function(labels){
    if (!labels || labels.length === 0) return;
    var offset = 2;
    for (var i = 0; i < labels.length; i++) {
      var label = (labels[i] || '').toString().trim();
      if (devToAr(label) === '1') {
        offset = i;
        break;
      }
    }
    PDF_OFFSET_CACHE[pk] = offset;
  }).catch(function(){
    PDF_OFFSET_CACHE[pk] = 2;
  });
}

// Check pdfJumpRequest and set pdfCurrentPage accordingly
// PDF_OFFSET_CACHE[pk] is guaranteed to be set before this is called
function resolvePdfJump(pk, maxPage){
  if (!pdfJumpRequest || pdfJumpRequest.pk !== pk) {
    pdfCurrentPage = 1;
    return;
  }
  var offset = PDF_OFFSET_CACHE[pk] || 2;
  var baseNum = parseInt(devToAr(pdfJumpRequest.rawTblPage), 10);
  pdfCurrentPage = isNaN(baseNum) ? 1 : baseNum + offset;
  if (maxPage && pdfCurrentPage > maxPage) pdfCurrentPage = maxPage;
  if (pdfCurrentPage < 1) pdfCurrentPage = 1;
  pdfJumpRequest = null;
}

function pdfRenderPage(){
  if (!pdfDoc) return;
  pdfDoc.getPage(pdfCurrentPage).then(function(page){
    // Auto-fit on first render
    if (pdfScale === null) {
      var wrapper = document.querySelector('.pdfCanvasWrapper');
      var wrapperW = (wrapper ? wrapper.clientWidth : 800) - 32;
      var vp1 = page.getViewport({scale: 1});
      pdfScale = Math.max(0.5, Math.min(2, wrapperW / vp1.width));
    }
    var viewport = page.getViewport({scale: pdfScale});
    var canvas = document.getElementById('pdfCanvas');
    if (!canvas) return;
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    page.render({canvasContext: canvas.getContext('2d'), viewport: viewport}).promise.then(function(){
      var inp = document.getElementById('pdfPageInput');
      if (inp) inp.value = pdfCurrentPage;
      var zl = document.getElementById('pdfZoomLevel');
      if (zl) zl.textContent = Math.round(pdfScale * 100) + '%';
    });
  }).catch(function(){});
}

// Called when switching between books or when PDF URL changes
function destroyPdfViewer(){
  if (pdfDoc) { pdfDoc.destroy(); pdfDoc = null; }
  pdfCurrentPk = null;
  pdfScale = null;
}

function pdfNextPage(){
  if (pdfDoc && pdfCurrentPage < pdfDoc.numPages) {
    pdfCurrentPage++;
    pdfRenderPage();
  }
}
function pdfPrevPage(){
  if (pdfDoc && pdfCurrentPage > 1) {
    pdfCurrentPage--;
    pdfRenderPage();
  }
}
function pdfGoToPage(num){
  if (pdfDoc && num >= 1 && num <= pdfDoc.numPages) {
    pdfCurrentPage = num;
    pdfRenderPage();
  }
}
function pdfZoomIn(){
  pdfScale = Math.min(3, (pdfScale || 1) + 0.25);
  pdfRenderPage();
}
function pdfZoomOut(){
  pdfScale = Math.max(0.5, (pdfScale || 1) - 0.25);
  pdfRenderPage();
}

function switchView(mode){
  viewMode = mode;
  if (mode === 'pdf') {
    pdfJumpRequest = null; // full PDF from beginning
  }
  renderWorkColumn();
}

function scrollToChapter(i){
  // Try anchor-based scroll first
  var chId = 'ch-'+(i+1);
  var target = document.getElementById(chId);
  if(target){
    target.scrollIntoView({behavior:'smooth', block:'start'});
    return true;
  }

  // Try to get start line from API (for files without anchors)
  var subj = INDEX[activeClass][activeSubject];
  var apiUrl = API_BASE+'/api/chapter-content?class='+encodeURIComponent(activeClass)+'&subject='+encodeURIComponent(subj)+'&index='+i;
  var xhr = new XMLHttpRequest();
  xhr.open('GET', apiUrl, false); // synchronous fallback
  try {
    xhr.send();
    if(xhr.status === 200){
      var data = JSON.parse(xhr.responseText);
      if(data.start_line !== undefined){
        var lineNum = data.start_line;
        // Find any element with that data-line attribute
        if(data._from_body) lineNum = Math.max(0, data.start_line - 2);
        var el = document.querySelector('#chapterContent [data-line="'+lineNum+'"]');
        if(el){
          el.scrollIntoView({behavior:'smooth', block:'start'});
          return true;
        }
        // Broader: find closest element with data-line >= start_line
        var allEls = document.querySelectorAll('#chapterContent [data-line]');
        for(var e=0; e<allEls.length; e++){
          var dl = parseInt(allEls[e].getAttribute('data-line'));
          if(dl >= lineNum){
            allEls[e].scrollIntoView({behavior:'smooth', block:'start'});
            return true;
          }
        }
      }
    }
  } catch(e) {}

  // Fallback: search rendered text for chapter name
  var chName = getChapterName();
  if(chName && chName.length > 2){
    var allEls = document.querySelectorAll('#chapterContent h1, #chapterContent h2, #chapterContent h3, #chapterContent h4');
    for(var e=0; e<allEls.length; e++){
      if(allEls[e].textContent.indexOf(chName) >= 0){
        allEls[e].scrollIntoView({behavior:'smooth', block:'start'});
        return true;
      }
    }
    // Broader search
    allEls = document.querySelectorAll('#chapterContent p, #chapterContent div');
    for(var e=0; e<allEls.length; e++){
      if(allEls[e].textContent.indexOf(chName) >= 0){
        allEls[e].scrollIntoView({behavior:'smooth', block:'start'});
        return true;
      }
    }
  }
  return false;
}

function selectChapter(i){
  selectedChapter = i; result=null; error=null;
  var pk = key(activeClass, INDEX[activeClass][activeSubject]);
  var tblData = TOC_TABLES[pk];
  var rawPage = tblData && tblData[i] && tblData[i].page;

  // Update sidebar active state
  document.querySelectorAll('.chapterBtn, .tocTable tr').forEach(function(el){
    el.classList.toggle('active', el.dataset && parseInt(el.dataset.ch)===i);
  });

  if (rawPage) {
    // Queue page jump — offset will be applied in loadPdfViewer after detection
    pdfJumpRequest = { pk: pk, rawTblPage: rawPage };
    viewMode = 'pdf';
    renderWorkColumn();
  } else {
    // No page data → show chapter view
    if (viewMode === 'pdf') {
      viewMode = 'chapter';
    }
    pdfJumpRequest = null;
    renderWorkColumn();
  }
}

// Cache for loaded markdown files to avoid re-fetching
const FULL_MARKDOWN_CACHE = {};

async function fetchChapterContent(index){
  var area = document.getElementById('chapterContent');
  if(!area) return;
  var subj = INDEX[activeClass][activeSubject];
  var k = key(activeClass, subj);

  // Try API first
  var apiUrl = API_BASE+'/api/chapter-content?class='+encodeURIComponent(activeClass)+'&subject='+encodeURIComponent(subj)+'&index='+index;
  try {
    var resp = await fetch(apiUrl);
    if(resp.ok){
      var data = await resp.json();
      var md = data.content || '';
      if(md){
        area.innerHTML = markdownToHtml(md);
        // Enable AI buttons
        var aiBtns = document.querySelectorAll('.actionCard');
        for(var b=0;b<aiBtns.length;b++) aiBtns[b].disabled = false;
        // Cache frontmatter
        if(!FILE_CACHE[k]) FILE_CACHE[k] = {};
        // Store chapter content for AI
        if(!FILE_CACHE[k].chapterContents) FILE_CACHE[k].chapterContents = {};
        FILE_CACHE[k].chapterContents[index] = md;
        return;
      }
    }
  } catch(e) {}

  // Fallback: load full file and extract chapter client-side
  var folder = encodeURIComponent(activeClass);
  var fname = encodeURIComponent(activeClass+' '+subj+'.md');
  var fileUrl = folder+'/'+fname;
  try {
    var resp = await fetch(fileUrl);
    if(!resp.ok){ area.innerHTML = '<div style="text-align:center;color:#A33B2C;font-size:13px;padding:12px 0">Could not load chapter content.</div>'; return; }
    var text = await resp.text();
    FULL_MARKDOWN_CACHE[k] = text;

    // Cache frontmatter and headings
    if(!FILE_CACHE[k]) FILE_CACHE[k] = {};
    if(!FILE_CACHE[k].frontmatter) FILE_CACHE[k].frontmatter = parseYamlFrontmatter(text);
    if(!FILE_CACHE[k].headings) FILE_CACHE[k].headings = parseChapterHeadings(text);

    // Find chapter boundaries using {#ch-N} anchors
    var lines = text.split('\n');
    var chNum = index + 1;
    var startLine = -1, endLine = lines.length;
    for(var i=0;i<lines.length;i++){
      var chMatch = lines[i].match(/\{#ch-(\d+)\}/);
      if(chMatch){
        var n = parseInt(chMatch[1]);
        if(n === chNum) startLine = i;
        else if(n > chNum && startLine >= 0){
          endLine = i;
          break;
        }
      }
    }

    if(startLine >= 0){
      var chLines = lines.slice(startLine, endLine);
      var chMd = chLines.join('\n');
      area.innerHTML = markdownToHtml(chMd);
    } else {
      // No anchor found — render entire file (legacy fallback)
      area.innerHTML = markdownToHtml(text);
    }

    // Enable AI buttons
    var aiBtns = document.querySelectorAll('.actionCard');
    for(var b=0;b<aiBtns.length;b++) aiBtns[b].disabled = false;
  } catch(e){
    area.innerHTML = '<div style="text-align:center;color:#A33B2C;font-size:13px;padding:12px 0">Error loading chapter: '+e.message+'</div>';
  }
}

// Cache for parsed file data (frontmatter + chapter headings)
const FILE_CACHE = {};

function parseYamlFrontmatter(text){
  // Normalize line endings
  text = text.replace(/\r\n/g,'\n');
  var m = text.match(/^---\s*\n([\s\S]*?)\n---/);
  if(!m) return {};
  var data = {};
  m[1].split('\n').forEach(function(line){
    line = line.trim();
    var sep = line.indexOf(':');
    if(sep>0) data[line.substring(0,sep).trim()] = line.substring(sep+1).trim().replace(/^["']|["']$/g,'');
  });
  return data;
}

function parseChapterHeadings(text){
  // Match ## heading {#ch-N} pattern
  var heads = [], rx = /^##\s+(.+?)\s*\{#ch-(\d+)\}\s*$/gm;
  var lines = text.split('\n');
  for(var i=0;i<lines.length;i++){
    var m2 = lines[i].match(rx);
    if(m2){
      var title = lines[i].replace(/^##\s+/,'').replace(/\s*\{#ch-\d+\}\s*$/,'').trim();
      // Clean up garbled prefix like "3: " or "१: "
      title = title.replace(/^[०१२३४५६७८९\d]+:\s*/,'');
      var num = parseInt(lines[i].match(/\{#ch-(\d+)\}/)[1]);
      heads.push({num:num, title:title, line:i});
    }
  }
  return heads;
}

function getChapterName(){
  const subj = INDEX[activeClass][activeSubject];
  const tr = TOC_TABLES[key(activeClass, subj)];
  if(tr && tr[selectedChapter]) return tr[selectedChapter].title;
  const ch = getChapters(activeClass, subj);
  return ch ? ch.chapters[selectedChapter] : '';
}
// Uses relative paths: works with python server.py locally, or Netlify Functions when deployed
const API_BASE = '';

async function callAI(mode){
  var resultArea = document.getElementById('resultArea');
  var subj = INDEX[activeClass][activeSubject];
  var chName = getChapterName();
  var modeNames = {mcq:'MCQs',mindmap:'Mind Map',exercise:'Practice',chapter_exercise:'Chapter Exercise',ask:'Ask AI'};
  var icons = {mcq:'📝',mindmap:'🧠',exercise:'✏️',chapter_exercise:'📘',ask:'💬'};
  var label = (icons[mode]||'💬')+' '+(modeNames[mode]||'');
  var query = '';
  if(mode==='ask'){
    query = document.getElementById('queryInput').value.trim();
    if(!query){ document.getElementById('queryInput').focus(); return; }
  } else {
    query = 'Generate '+modeNames[mode].toLowerCase()+' for this chapter based on the textbook content provided.';
  }

  // Show loading state
  resultArea.innerHTML = '<div class="resultBox"><div class="resultMeta">'+label+' &mdash; '+chName+'</div><div class="resultText"><span class="loadingDots">Loading textbook</span></div></div>';
  var btns = document.querySelectorAll('.actionCard, .queryBtn');
  for(var b=0;b<btns.length;b++) btns[b].disabled = true;

  // For Chapter Exercise: show extracted exercises if available, else AI
  if(mode==='chapter_exercise'){
    var proceedToAI = function() {
      doAIFetch(mode, query, label, btns);
    };
    var showExtracted = function(data) {
      var exKey = key(activeClass, subj);
      var exData = data ? data[exKey] : null;
      var matched = [];
      if(exData && exData.exercises){
        for(var ei=0;ei<exData.exercises.length;ei++){
          var ex = exData.exercises[ei];
          if(ex.chapterIndex===null || ex.chapterIndex===undefined) continue;
          if(ex.chapterIndex===selectedChapter) matched.push(ex);
        }
      }
      if(matched.length>0){
        // Send extracted exercises to AI for answer generation
        var exerciseText = '';
        for(var mi=0;mi<matched.length;mi++){
          var ex = matched[mi];
          exerciseText += (ex.name || 'Exercise') + ':\n' + ex.text + '\n\n';
        }
        var answerQuery = 'Answer the following textbook exercises for this chapter. For each exercise, provide the correct answer/solution. Here are the exercises:\n\n'+exerciseText;
        resultArea.innerHTML = '<div class="resultBox"><div class="resultMeta">'+label+' &mdash; '+chName+'</div><div class="resultText"><span class="loadingDots">Generating answers for textbook exercises</span></div></div>';
        doAIFetch(mode, answerQuery, label, btns);
        return true;
      }
      return false;
    };
    // If EXERCISES_DATA already cached, check now - skip loading if subject not in it
    if(EXERCISES_DATA){
      if(!showExtracted(EXERCISES_DATA)) proceedToAI();
      return;
    }
    // Not cached yet - load then check
    resultArea.innerHTML = '<div class="resultBox"><div class="resultMeta">'+label+' &mdash; '+chName+'</div><div class="resultText"><span class="loadingDots">Looking up textbook exercises</span></div></div>';
    fetch('exercises.json').then(function(r){return r.json()}).then(function(d){
      EXERCISES_DATA = d;
      if(!showExtracted(d)) proceedToAI();
    }).catch(function(){
      proceedToAI();
    });
    return;
  }

  // For non-chapter_exercise modes, go directly to AI
  doAIFetch(mode, query, label, btns);
}

async function doAIFetch(mode, query, label, btns){
  var resultArea = document.getElementById('resultArea');
  var subj = INDEX[activeClass][activeSubject];
  var chName = getChapterName();

  var k = key(activeClass, activeSubject);
  var folder = encodeURIComponent(activeClass);
  var fname = encodeURIComponent(activeClass+' '+subj+'.md');
  var fileUrl = folder+'/'+fname;
  var fileContent = '';
  try {
    var resp = await fetch(fileUrl);
    if(resp.ok) fileContent = await resp.text();
  } catch(e) {}
  // Parse subject from file frontmatter if available
  if(!FILE_CACHE[k] || !FILE_CACHE[k].frontmatter){
    if(!FILE_CACHE[k]) FILE_CACHE[k] = {};
    FILE_CACHE[k].frontmatter = parseYamlFrontmatter(fileContent);
  }
  var fileSubject = FILE_CACHE[k] && FILE_CACHE[k].frontmatter && FILE_CACHE[k].frontmatter.subject;
  var resolvedSubject = fileSubject || subj;

  var MAX_CHARS = 20000;
  var startPos = 0;
  if(chName && fileContent.length > MAX_CHARS){
    var searchQueries = [chName];
    if(selectedChapter !== null && selectedChapter !== undefined){
      var num = selectedChapter + 1;
      searchQueries.push('Chapter '+num);
      searchQueries.push('chapter '+num);
      searchQueries.push(num+'. ');
      searchQueries.push('kf7 M ');
      if(num<=9) searchQueries.push('kf7 M '+num);
      var nepaliNum = ['०','१','२','३','४','५','६','७','८','९'];
      var nepNumStr = num.toString().split('').map(function(d){return nepaliNum[parseInt(d)]}).join('');
      searchQueries.push(nepNumStr+'. ');
      searchQueries.push(nepNumStr+'.');
    }
    for(var q=0; q<searchQueries.length; q++){
      var idx = fileContent.indexOf(searchQueries[q]);
      if(idx >= 0){
        startPos = Math.max(0, idx - 200);
        break;
      }
    }
  }
  fileContent = fileContent.substring(startPos, startPos + MAX_CHARS);
  resultArea.innerHTML = '<div class="resultBox"><div class="resultMeta">'+label+' &mdash; '+chName+'</div><div class="resultText"><span class="loadingDots">Thinking</span></div></div>';
  var basePayload = {class:activeClass,subject:resolvedSubject,chapterIndex:selectedChapter,query:query,mode:mode,fileContent:fileContent};
  var streamPayload = JSON.parse(JSON.stringify(basePayload));
  streamPayload.stream = true;
  var xhr = new XMLHttpRequest();
  xhr.open('POST', API_BASE+'/api/chat/stream', true);
  xhr.setRequestHeader('Content-Type','application/json');
  var lastIdx = 0;
  xhr.onprogress = function(){
    var text = xhr.responseText.substring(lastIdx);
    lastIdx = xhr.responseText.length;
    if(text){
      resultArea.innerHTML = '<div class="resultBox"><div class="resultMeta">'+label+' &mdash; '+chName+'</div><div class="resultText" style="white-space:pre-wrap">'+cleanResponse(xhr.responseText)+'</div></div>';
    }
  };
  xhr.onload = function(){
    if(xhr.status===200){
      resultArea.innerHTML = '<div class="resultBox"><div class="resultMeta">'+label+' &mdash; '+chName+'</div><div class="resultText" style="white-space:pre-wrap">'+cleanResponse(xhr.responseText)+'</div></div>';
    } else {
      var xhr2 = new XMLHttpRequest();
      xhr2.open('POST', API_BASE+'/api/chat', true);
      xhr2.setRequestHeader('Content-Type','application/json');
      xhr2.onload = function(){
        if(xhr2.status===200){
          var data = JSON.parse(xhr2.responseText);
          if(data.error) throw new Error(data.error);
          resultArea.innerHTML = '<div class="resultBox"><div class="resultMeta">'+label+' &mdash; '+chName+'</div><div class="resultText" style="white-space:pre-wrap">'+cleanResponse(data.answer)+'</div></div>';
        } else {
          resultArea.innerHTML = '<div class="resultBox"><div class="resultMeta">'+label+' &mdash; '+chName+'</div><div class="errorBox">\u26a0\ufe0f Error: Could not reach AI server.</div></div>';
        }
      };
      xhr2.onerror = function(){
        resultArea.innerHTML = '<div class="resultBox"><div class="resultMeta">'+label+' &mdash; '+chName+'</div><div class="errorBox">\u26a0\ufe0f Network error. Check your connection.</div></div>';
      };
      xhr2.send(JSON.stringify(basePayload));
    }
    for(var b=0;b<btns.length;b++) btns[b].disabled = false;
  };
  xhr.onerror = function(){
    resultArea.innerHTML = '<div class="resultBox"><div class="resultMeta">'+label+' &mdash; '+chName+'</div><div class="errorBox">\u26a0\ufe0f Network error. Check your connection.</div></div>';
    for(var b=0;b<btns.length;b++) btns[b].disabled = false;
  };
  xhr.send(JSON.stringify(streamPayload));
}

async function loadFullBook(){
  var area = document.getElementById('chapterContent');
  if(!area) return;
  var subj = INDEX[activeClass][activeSubject];
  var folder = encodeURIComponent(activeClass);
  var fname = encodeURIComponent(activeClass+' '+subj+'.md');
  var fileUrl = folder+'/'+fname;
  try {
    var resp = await fetch(fileUrl);
    if(!resp.ok){ area.innerHTML = ''; return; }
    var text = await resp.text();

    // Cache frontmatter and headings (for AI features)
    var k = key(activeClass, activeSubject);
    if(!FILE_CACHE[k]) FILE_CACHE[k] = {};
    if(!FILE_CACHE[k].frontmatter) FILE_CACHE[k].frontmatter = parseYamlFrontmatter(text);
    if(!FILE_CACHE[k].headings) FILE_CACHE[k].headings = parseChapterHeadings(text);

    // Render full book content
    area.innerHTML = markdownToHtml(text);

    // Try pending scroll first (user clicked chapter before book loaded)
    var scrollCh = (pendingScroll !== null && pendingScroll !== undefined) ? pendingScroll : selectedChapter;
    pendingScroll = null;
    if(scrollCh !== null && scrollCh !== undefined){
      var aiBtns = document.querySelectorAll('.actionCard');
      for(var b=0;b<aiBtns.length;b++) aiBtns[b].disabled = false;
      requestAnimationFrame(function(){ scrollToChapter(scrollCh); });
    }
  } catch(e){ area.innerHTML = ''; }
}

function markdownToHtml(md){
  var lines = md.split('\n');
  var html = '', inList = false, inOrdered = false;
  for(var i=0;i<lines.length;i++){
    var l = lines[i], t = l.trim();
    if(!t){
      if(inList){ html += '</ul>'; inList = false; }
      if(inOrdered){ html += '</ol>'; inOrdered = false; }
      continue;
    }
    function anchorId(text){
      var m2 = text.match(/\{#ch-(\d+)\}/);
      return m2 ? ' id="ch-'+m2[1]+'"' : '';
    }
    function stripAnchor(text){ return text.replace(/\s*\{#ch-\d+\}\s*/g,''); }
    function addLineAttr(){ return ' data-line="'+i+'"'; }
    if(t.startsWith('### ')){ var c3=stripAnchor(t.substring(4)); html += '<h3'+anchorId(t)+addLineAttr()+'>'+inlineFmt(c3)+'</h3>'; continue; }
    if(t.startsWith('## ')){ var c2=stripAnchor(t.substring(3)); html += '<h2'+anchorId(t)+addLineAttr()+'>'+inlineFmt(c2)+'</h2>'; continue; }
    if(t.startsWith('# ')){ var c1=stripAnchor(t.substring(2)); html += '<h1'+anchorId(t)+addLineAttr()+'>'+inlineFmt(c1)+'</h1>'; continue; }
    if(t.startsWith('- ')||t.startsWith('* ')){
      var item = t.startsWith('- ')?t.substring(2):t.substring(2);
      if(inOrdered){ html += '</ol>'; inOrdered = false; }
      if(!inList){ html += '<ul>'; inList = true; }
      html += '<li'+addLineAttr()+'>'+inlineFmt(item)+'</li>'; continue;
    }
    if(/^\d+[\.\)]\s/.test(t)){
      var item = t.replace(/^\d+[\.\)]\s/,'');
      if(inList){ html += '</ul>'; inList = false; }
      if(!inOrdered){ html += '<ol>'; inOrdered = true; }
      html += '<li'+addLineAttr()+'>'+inlineFmt(item)+'</li>'; continue;
    }
    if(/^!\[.*\]\(.*\)$/.test(t)){
      var alt = t.match(/!\[(.*?)\]/)[1];
      var src = t.match(/\((.*?)\)/)[1];
      html += '<img src="'+src+'" alt="'+alt+'"'+addLineAttr()+'>'; continue;
    }
    if(/^[-*_]{3,}$/.test(t)){ html += '<hr>'; continue; }
    if(inList){ html += '</ul>'; inList = false; }
    if(inOrdered){ html += '</ol>'; inOrdered = false; }
    html += '<p'+addLineAttr()+'>'+inlineFmt(t)+'</p>';
  }
  if(inList) html += '</ul>';
  if(inOrdered) html += '</ol>';
  return html;
}

function inlineFmt(s){
  s = s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g,'<em>$1</em>');
  return s;
}

function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function cleanResponse(t){
  // Strip markdown separators, LaTeX delimiters, and excess blank lines
  return t
    .replace(/^[-\*_]{3,}\s*$/gm,'')
    .replace(/\n{3,}/g,'\n\n')
    .replace(/\\[()\[\]]/g,'')  // strip \( \) \[ \]
    .trim()
}

function filterSidebar(val){
  const q = val.toLowerCase().trim();
  document.querySelectorAll('.classRow').forEach(el => {
    const text = el.textContent.toLowerCase();
    el.closest('div').style.display = (!q || text.includes(q)) ? '' : 'none';
  });
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar(){
  if(window.innerWidth<=768){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }
}

renderSidebar();
renderContent();
